name: build-redoubt-image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Container registry to push to
        required: false
        type: string
        default: ghcr.io

      image-name:
        description: Image name without owner, e.g. static-base
        required: true
        type: string

      platforms:
        description: Comma-separated list of Docker build platforms
        required: false
        type: string
        default: linux/amd64,linux/arm64
      context:
        required: false
        description: Build context path (default images/<image-name>)
        type: string
        default: ""

      dockerfile:
        required: false
        description: Dockerfile's filename
        type: string 
        default: Dockerfile

      data-boundary:
        required: false
        description: Enable if for data-boundary images.
        type: boolean 
        default: false

  workflow_call:
    inputs:
      registry:
        required: false
        type: string
        default: ghcr.io
      image-name:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64
      context:
        required: false
        type: string
        default: ""
      dockerfile:
        required: false
        type: string 
        default: Dockerfile
      data-boundary:
        required: false
        type: boolean 
        default: false
    outputs:
      digest:
        description: sha256 digest of the pushed image
        value: ${{ jobs.build.outputs.digest }}
      image:
        description: Image ref without digest (registry/owner/name)
        value: ${{ jobs.build.outputs.image }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image-name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/${{ inputs.image-name }}
  PLATFORMS: ${{ inputs.platforms }}

jobs:
  build:
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (arm64 support)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=${{ inputs.image-name }}/v(.*),group=1
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=${{ inputs.image-name }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context != '' && inputs.context || format('images/{0}', inputs.image-name)}}
          file:  ${{ format('{0}/{1}', inputs.context != '' && inputs.context || format('images/{0}', inputs.image-name), inputs.dockerfile) }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: false

      - name: Trivy(Gate)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Trivy(Report)
        if: always() && github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.image-name }}


      - name: Log podman into GHCR
        if: inputs.data-boundary && github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install & Run OpenSCAP STIG scan
        if: inputs.data-boundary
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          set -eu
          sudo apt-get update -qq
          sudo apt-get install -y -qq openscap-scanner podman

          SSG_VERSION=0.1.80
          curl -fsSL -o ssg.tar.bz2 \
            "https://github.com/ComplianceAsCode/content/releases/download/v${SSG_VERSION}/scap-security-guide-${SSG_VERSION}.tar.bz2"
          tar -xjf ssg.tar.bz2

          # Export the image's flattened rootfs and scan it with oscap-chroot.
          # Avoids oscap-podman's rootful/rootless socket issues on GH runners.
          podman pull "${IMAGE}@${DIGEST}"
          podman create --name redoubt-scan-target "${IMAGE}@${DIGEST}"
          mkdir -p rootfs
          podman export redoubt-scan-target | tar -xC rootfs/
          podman rm redoubt-scan-target

          sudo oscap-chroot rootfs/ xccdf eval \
            --profile xccdf_org.ssgproject.content_profile_stig \
            --tailoring-file "images/${IMAGE_NAME}/stig-tailoring.xml" \
            --results stig-results.xml \
            --report stig-report.html \
            "scap-security-guide-${SSG_VERSION}/ssg-rhel9-ds.xml" || true

      - name: Upload STIG report
        if: always() && inputs.data-boundary && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: stig-${{ inputs.image-name }}
          path: |
            stig-report.html
            stig-results.xml
        
      - name: Install Cosign
        if: always() && github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        run: |
          set -eu
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        if: always() && github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM as cosign attestation
        if: always() && github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        run: |
          set -eu
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"

      - name: Verify Signed Image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          cosign verify "${IMAGE}@${DIGEST}" \
          --certificate-identity-regexp 'https://github.com/ej-east/redoubt/\.github/workflows/build-redoubt-image\.yaml@.*' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Verify Attestation
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp 'https://github.com/ej-east/redoubt/\.github/workflows/build-redoubt-image\.yaml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}@${DIGEST}" > /dev/null