name: build-redoubt-image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Container registry to push to
        required: false
        type: string
        default: ghcr.io

      image-name:
        description: Image name without owner, e.g. static-base
        required: true
        type: string

      platforms:
        description: Comma-separated list of Docker build platforms
        required: false
        type: string
        default: linux/amd64,linux/arm64
      context:
        required: false
        description: Build context path (default images/<image-name>)
        type: string
        default: ""
      dockerfile:
        required: false
        description: Dockerfile's filename
        type: string 
        default: Dockerfile

  workflow_call:
    inputs:
      registry:
        required: false
        type: string
        default: ghcr.io
      image-name:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64
      context:
        required: false
        type: string
        default: ""
      dockerfile:
        required: false
        type: string 
        default: Dockerfile
    outputs:
      digest:
        description: sha256 digest of the pushed image
        value: ${{ jobs.build.outputs.digest }}
      image:
        description: Image ref without digest (registry/owner/name)
        value: ${{ jobs.build.outputs.image }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image-name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/${{ inputs.image-name }}
  PLATFORMS: ${{ inputs.platforms }}

jobs:
  build:
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (arm64 support)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=${{ inputs.image-name }}/v(.*),group=1
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=${{ inputs.image-name }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.context != '' && inputs.context || format('images/{0}', inputs.image-name)}}
          file:  ${{ format('{0}/{1}', inputs.context != '' && inputs.context || format('images/{0}', inputs.image-name), inputs.dockerfile) }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: false

      - name: Trivy(Gate)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Trivy(Report)
        if: always() && github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.image-name }}

      - name: Install Cosign
        if: always() && github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        run: |
          set -eu
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        if: always() && github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM as cosign attestation
        if: always() && github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        run: |
          set -eu
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"

      - name: Verify Signed Image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          cosign verify "${IMAGE}@${DIGEST}" \
          --certificate-identity-regexp 'https://github.com/ej-east/redoubt/\.github/workflows/build-redoubt-image\.yaml@.*' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Verify Attestation
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp 'https://github.com/ej-east/redoubt/\.github/workflows/build-redoubt-image\.yaml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}@${DIGEST}"